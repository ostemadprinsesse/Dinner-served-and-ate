name: Build and Deploy (Two VMs)

on:
  push:
    branches: ["main", "nginx-and-backend"]

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      github_owner: ${{ steps.vars.outputs.github_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: vars
        run: |
          echo "github_owner=$(echo \"${{ github.repository_owner }}\" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_GITHUB_USERNAME }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push backend/frontend/nginx
        run: |
          GITHUB_OWNER="${{ steps.vars.outputs.github_owner }}" \
          docker buildx bake -f src/docker-compose.prod.yml \
            --set *.platform=linux/amd64 \
            --push

  deploy-backend:
    needs: build-images
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST_NGINX: ${{ secrets.SSH_HOST_NGINX }}
      BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      CR_PAT: ${{ secrets.CR_PAT }}
      DOCKER_GITHUB_USERNAME: ${{ secrets.DOCKER_GITHUB_USERNAME }}
      GITHUB_OWNER: ${{ needs.build-images.outputs.github_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key

      - name: Create backend .env
        run: |
          cat > .env <<EOF
          GITHUB_OWNER=${GITHUB_OWNER}
          EOF

      - name: Upload backend compose and env via bastion
        run: |
          scp -i ~/.ssh/ssh_key \
            -o StrictHostKeyChecking=no \
            -o ProxyJump="$SSH_USER@$SSH_HOST_NGINX" \
            src/docker-compose.backend.yml "$SSH_USER@$BACKEND_PRIVATE_IP:~/app/docker-compose.backend.yml"

          scp -i ~/.ssh/ssh_key \
            -o StrictHostKeyChecking=no \
            -o ProxyJump="$SSH_USER@$SSH_HOST_NGINX" \
            .env "$SSH_USER@$BACKEND_PRIVATE_IP:~/app/.env"

      - name: Deploy backend on private VM
        run: |
          ssh -i ~/.ssh/ssh_key \
            -o StrictHostKeyChecking=no \
            -o ProxyJump="$SSH_USER@$SSH_HOST_NGINX" \
            "$SSH_USER@$BACKEND_PRIVATE_IP" << EOF
            set -euo pipefail
            cd ~/app
            echo "$CR_PAT" | docker login ghcr.io -u "$DOCKER_GITHUB_USERNAME" --password-stdin
            docker compose --env-file .env -f docker-compose.backend.yml pull
            docker compose --env-file .env -f docker-compose.backend.yml up -d
          EOF

  deploy-nginx:
    needs: [build-images, deploy-backend]
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST_NGINX: ${{ secrets.SSH_HOST_NGINX }}
      BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      CR_PAT: ${{ secrets.CR_PAT }}
      DOCKER_GITHUB_USERNAME: ${{ secrets.DOCKER_GITHUB_USERNAME }}
      GITHUB_OWNER: ${{ needs.build-images.outputs.github_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key

      - name: Create nginx .env
        run: |
          cat > .env <<EOF
          GITHUB_OWNER=${GITHUB_OWNER}
          BACKEND_PRIVATE_IP=${BACKEND_PRIVATE_IP}
          EOF

      - name: Upload nginx compose and env
        run: |
          scp -i ~/.ssh/ssh_key \
            -o StrictHostKeyChecking=no \
            src/docker-compose.nginx.yml "$SSH_USER@$SSH_HOST_NGINX:~/app/docker-compose.nginx.yml"
          scp -i ~/.ssh/ssh_key \
            -o StrictHostKeyChecking=no \
            .env "$SSH_USER@$SSH_HOST_NGINX:~/app/.env"

      - name: Deploy nginx and frontend on public VM
        run: |
          ssh -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST_NGINX" << EOF
            set -euo pipefail
            cd ~/app
            echo "$CR_PAT" | docker login ghcr.io -u "$DOCKER_GITHUB_USERNAME" --password-stdin
            docker compose --env-file .env -f docker-compose.nginx.yml pull
            docker compose --env-file .env -f docker-compose.nginx.yml up -d
          EOF
